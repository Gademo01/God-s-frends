
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prière du Matin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201, 168, 76, 0.22);
      --dark: #0d0d1a;
      --dark2: #13132b;
      --dark3: #1c1c38;
      --text: #f0ead8;
      --text-muted: rgba(240, 234, 216, 0.6);
      --text-dim: rgba(240, 234, 216, 0.3);
    }

    html, body {
      min-height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 15%, rgba(201,168,76,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 85%, rgba(100,80,200,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 0.8s ease both;
    }

    .cross-wrap { display: flex; justify-content: center; margin-bottom: 1rem; }

    .cross { position: relative; width: 34px; height: 42px; }
    .cross::before {
      content: '';
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 4px; height: 100%;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold));
      border-radius: 2px;
      box-shadow: 0 0 14px var(--gold-dim);
    }
    .cross::after {
      content: '';
      position: absolute;
      left: 0; top: 38%;
      width: 100%; height: 4px;
      background: linear-gradient(to right, var(--gold-light), var(--gold));
      border-radius: 2px;
      box-shadow: 0 0 14px var(--gold-dim);
    }

    .app-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(17px, 4vw, 24px);
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .app-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.4rem;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(145deg, var(--dark2) 0%, var(--dark3) 100%);
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.06),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(201,168,76,0.12);
      animation: fadeUp 0.9s ease 0.2s both;
    }

    .card-line {
      height: 2px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .card-inner { padding: 2rem 2.25rem 1.75rem; }

    .date-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .date-rule { flex: 1; height: 1px; background: var(--gold-dim); }
    .date-text {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .intro-text {
      font-size: 15px;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .prayer-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 600;
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    .prayer-body {
      font-size: clamp(16px, 2.5vw, 19px);
      line-height: 1.95;
      color: var(--text);
      font-weight: 300;
      font-style: italic;
      text-align: center;
      margin-bottom: 1.25rem;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .amen {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.08em;
      font-style: normal;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .ornament-line { flex: 1; height: 1px; background: var(--gold-dim); }
    .ornament-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      border-radius: 1px;
      box-shadow: 0 0 8px var(--gold);
    }

    .cta-text {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      font-style: italic;
      line-height: 1.7;
    }

    .cta-tag {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-align: center;
      margin-top: 0.5rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 1.75rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 110px;
      padding: 13px 18px;
      border-radius: 10px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.22s ease;
      text-transform: uppercase;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--gold);
    }
    .btn-outline:hover { background: var(--gold-dim); border-color: var(--gold); }

    .btn-solid {
      background: linear-gradient(135deg, var(--gold) 0%, #a8782a 100%);
      color: #0d0d1a;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(201,168,76,0.28);
    }
    .btn-solid:hover { box-shadow: 0 6px 28px rgba(201,168,76,0.45); transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    .share-hint {
      text-align: center;
      font-size: 12px;
      color: var(--gold);
      font-style: italic;
      margin-top: 0.9rem;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .share-hint.show { opacity: 1; }

    footer {
      margin-top: 1.75rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      animation: fadeUp 1s ease 0.5s both;
    }

    .loading-dots { display: inline-flex; gap: 6px; align-items: center; }
    .loading-dots span {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.2s ease infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark3);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 11px 26px;
      border-radius: 40px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px var(--gold-dim);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    @keyframes prayerIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .prayer-animate { animation: prayerIn 0.7s ease both; }

    @media (max-width: 480px) {
      .card-inner { padding: 1.5rem 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="cross-wrap"><div class="cross"></div></div>
    <h1 class="app-title">Prière du Matin</h1>
    <p class="app-sub">Une prière pour chaque nouveau jour</p>
  </header>

  <div class="card">
    <div class="card-line"></div>
    <div class="card-inner">

      <div class="date-row">
        <div class="date-rule"></div>
        <span class="date-text" id="dateLabel">...</span>
        <div class="date-rule"></div>
      </div>

      <p class="intro-text" id="introText">Chargement de la prière du jour...</p>
      <div class="prayer-title" id="prayerTitle"></div>

      <div class="prayer-body" id="prayerBody">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>

      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line"></div>
      </div>

      <p class="cta-text" id="ctaText"></p>
      <p class="cta-tag" id="ctaTag"></p>

      <div class="actions">
        <button class="btn btn-outline" onclick="loadPrayer()">✦ Nouvelle prière</button>
        <button class="btn btn-solid" onclick="sendWhatsApp()">WhatsApp ↗</button>
      </div>
      <div class="actions" style="margin-top: 8px;">
        <button class="btn btn-outline" style="font-size:10px;" onclick="copyPrayer()">📋 Copier le texte</button>
      </div>

      <p class="share-hint" id="shareHint">✓ Prière copiée — prête à partager !</p>

    </div>
  </div>

  <footer>✝️ &nbsp;«&nbsp;Priez sans cesse.&nbsp;» — 1 Thessaloniciens 5:17</footer>

</div>

<div class="toast" id="toast">✓ Prière copiée !</div>

<script>
  const FALLBACK = [
    {
      intro: "J'aimerais partager la prière d'aujourd'hui avec toi !",
      titre: "Apprends-moi à vivre",
      priere: "Seigneur, merci de m'avoir rendu juste à tes yeux. Je ne peux rien faire pour mériter cela. C'est quelque chose que tu m'as offert librement parce que tu m'aimes. Merci ! Pardonne-moi pour toutes les fois où je t'ai rejeté égoïstement, et montre-moi comment vivre une vie qui t'honore.",
      cta: "Envoie-la à quelqu'un pour être une bénédiction.",
      tag: "GGMC ✝️🙌🙏"
    },
    {
      intro: "Voici la prière du jour, reçois-la avec un cœur ouvert !",
      titre: "Donne-moi la paix",
      priere: "Père céleste, tu connais chaque inquiétude qui habite mon cœur ce matin. Je dépose tout devant toi — mes peurs, mes doutes, mes fardeaux. Ta Parole dit que ta paix dépasse tout entendement. Je la réclame aujourd'hui par la foi. Garde mon cœur et mon esprit en Jésus-Christ.",
      cta: "Partage cette prière avec quelqu'un qui en a besoin aujourd'hui.",
      tag: "GGMC ✝️🙌🙏"
    },
    {
      intro: "Une prière spéciale pour commencer cette journée avec Dieu !",
      titre: "Renouvelle mes forces",
      priere: "Seigneur, ce matin je viens à toi fatigué, mais confiant. Ta Parole dit que ceux qui espèrent en toi renouvellent leurs forces. Je crois cela. Remplis-moi de ton Esprit, dirige mes pas aujourd'hui et que tout ce que je fasse soit pour ta gloire. Je ne peux rien sans toi, mais avec toi je peux tout.",
      cta: "Envoie cette prière à quelqu'un pour l'encourager aujourd'hui.",
      tag: "GGMC ✝️🙌🙏"
    },
    {
      intro: "Prends un moment pour prier avec moi ce matin !",
      titre: "Garde-moi de la tentation",
      priere: "Père, tu connais mes faiblesses mieux que moi-même. Ce matin je te demande ta force pour résister à tout ce qui m'éloigne de toi. Ne me laisse pas succomber à la tentation, mais délivre-moi du mal. Que ta présence soit mon bouclier et ta Parole ma lumière tout au long de cette journée.",
      cta: "Partage cette prière — quelqu'un en a peut-être besoin maintenant.",
      tag: "GGMC ✝️🙌🙏"
    },
    {
      intro: "Commençons cette journée par la prière ensemble !",
      titre: "Merci pour la vie",
      priere: "Seigneur, merci pour le souffle que tu m'as accordé ce matin. Chaque jour est un cadeau de ta grâce. Pardonne-moi mes manquements d'hier et accorde-moi un cœur nouveau pour aujourd'hui. Aide-moi à voir les autres avec tes yeux et à aimer comme tu m'as aimé. À toi toute la gloire !",
      cta: "Envoie cette prière à quelqu'un pour être sauvé.",
      tag: "GGMC ✝️🙌🙏"
    },
  ];

  let currentData = null;

  function getDateLabel() {
    const d = new Date();
    const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function renderPrayer(data) {
    currentData = data;
    document.getElementById('introText').textContent = data.intro;
    document.getElementById('prayerTitle').textContent = data.titre;
    document.getElementById('prayerBody').innerHTML = `
      <span class="prayer-animate">${data.priere}</span>
      <span class="amen prayer-animate" style="animation-delay:0.2s">Au nom de Jésus ! Amen. ✝️🙌🙏</span>
    `;
    document.getElementById('ctaText').textContent = data.cta;
    document.getElementById('ctaTag').textContent = data.tag;
  }

  async function loadPrayer() {
    document.getElementById('introText').textContent = 'Préparation de la prière du jour...';
    document.getElementById('prayerTitle').textContent = '';
    document.getElementById('prayerBody').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
    document.getElementById('ctaText').textContent = '';
    document.getElementById('ctaTag').textContent = '';
    document.getElementById('shareHint').classList.remove('show');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Génère une prière chrétienne du matin dans le style des groupes WhatsApp chrétiens africains francophones.
Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks:
{
  "intro": "[phrase d'intro chaleureuse, ex: J'aimerais partager la prière d'aujourd'hui avec toi !]",
  "titre": "[titre court et percutant, ex: Apprends-moi à vivre]",
  "priere": "[prière complète : remerciement + repentance + demande précise. Ton sincère et chaleureux, comme un frère qui prie. 3-5 phrases.]",
  "cta": "[appel à partager, ex: Envoie-la à quelqu'un pour être une bénédiction.]",
  "tag": "GGMC ✝️🙌🙏"
}
Varie les thèmes : la paix, la force, la protection, la famille, le travail, la délivrance, la grâce, la guérison.`
          }]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      renderPrayer(JSON.parse(clean));
    } catch(e) {
      const idx = Math.floor(Math.random() * FALLBACK.length);
      renderPrayer(FALLBACK[idx]);
    }
  }

  function getPrayerText() {
    if (!currentData) return '';
    return `${currentData.intro}\n\n${currentData.titre}\n\n${currentData.priere}\n\nAu nom de Jésus ! Amen. ✝️🙌🙏\n\n${currentData.cta}\n\n${currentData.tag}`;
  }

  function sendWhatsApp() {
    if (!currentData) return;
    const text = encodeURIComponent(getPrayerText());
    const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
    const url = isMobile
      ? `whatsapp://send?text=${text}`
      : `https://web.whatsapp.com/send?text=${text}`;
    window.open(url, '_blank');
  }

  function copyPrayer() {
    const text = getPrayerText();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(showCopied);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showCopied();
    }
  }

  function showCopied() {
    document.getElementById('toast').classList.add('show');
    document.getElementById('shareHint').classList.add('show');
    setTimeout(() => document.getElementById('toast').classList.remove('show'), 2800);
  }

  document.getElementById('dateLabel').textContent = getDateLabel();
  loadPrayer();
</script>
</body>
</html>
